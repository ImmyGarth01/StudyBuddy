version: '3.3'

services:
  web:
    build:
      context: ./
    volumes:
      - .:/src
      - /src/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: db
    ports:
      - "3308:3306"
    volumes:
      - ./sd2-db.sql:/docker-entrypoint-initdb.d/sd2-db.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: always
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8081:80"